<html lang="en">
<head>
    <title>Membership Registration | PowerHouse Gym</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/script.js" defer></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <h1>PowerHouse Gym</h1>
        <p>Start your fitness journey today.</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">About Us</a></li>
            <li><a href="registration.html" class="active">Registration</a></li>
            <li><a href="creative.html">Creative Page</a></li>
        </ul>
    </nav>

    <main>

        <section class="form-section">
            <h2>Membership Registration</h2>
            <p>Complete the form below to register for a gym membership.</p>

            <form id="registrationForm">

                <label for="fullName">Full Name:</label>
                <input type="text" id="fullName" name="fullName">

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email">

                <label for="phone">Phone Number:</label>
                <input type="text" id="phone" name="phone" placeholder="Example: 123-456-7890">

                <label for="age">Age:</label>
                <input type="number" id="age" name="age">

                <label for="membership">Membership Type:</label>
                <select id="membership" name="membership">
                    <option value="">Select a membership</option>
                    <option value="basic">Basic</option>
                    <option value="standard">Standard</option>
                    <option value="premium">Premium</option>
                </select>

                <label for="goals">Fitness Goals:</label>
                <textarea id="goals" name="goals" rows="5"></textarea>

                <label for="time">Preferred Workout Time:</label>
                <select id="time" name="time">
                    <option value="">Select a time</option>
                    <option value="morning">Morning</option>
                    <option value="afternoon">Afternoon</option>
                    <option value="evening">Evening</option>
                </select>

                <label for="level">Experience Level:</label>
                <select id="level" name="level">
                    <option value="">Select your level</option>
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>

                <button type="submit">Submit Registration</button>

            </form>

            <div id="formMessage"></div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 PowerHouse Gym | Built for Strength and Progress</p>
    </footer>

</body>
</html>
